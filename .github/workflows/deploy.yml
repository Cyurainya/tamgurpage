name: Deploy homepage

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tamgur-homepage-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file homepage
        run: npm run build

      - name: Configure SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload homepage
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
            dist/index.html \
            "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/index.html.new"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "mv '$DEPLOY_PATH/index.html.new' '$DEPLOY_PATH/index.html'"

          for file in robots.txt sitemap.xml llms.txt; do
            scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
              "dist/$file" \
              "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/$file.new"
            ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
              "$SERVER_USER@$SERVER_HOST" \
              "mv '$DEPLOY_PATH/$file.new' '$DEPLOY_PATH/$file'"
          done
